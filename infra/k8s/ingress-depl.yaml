apiVersion: networking.k8s.io/v1  # Updated API version
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - host: ticketing.dev  # Update with your actual domain
      http:
        paths:
          - path: /api/users/?(.*)  # Regular expression-style path
            pathType: ImplementationSpecific         # Path type is required in v1
            backend:
              service:
                name: auth-svc       # Updated field: service.name
                port:
                  number: 3000       # Updated field: service.port.number